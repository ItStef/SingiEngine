<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SingiEngine – Functional ECS Ship Shooter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>
    <div id="hint">
    <span>Arrow keys / WASD</span> — Move &nbsp;|&nbsp;
    <span>Space</span> — Shoot
    </div>

    <script>

        // Canvas
        const canvas = document.getElementById('game');
        const ctx    = canvas.getContext('2d');
        const Width = canvas.width  = 480;
        const Height = canvas.height = 640;


        // Utils
        const pipe = (...functions) => arg => functions.reduce((variable, func) => func(variable), arg);

        const setComponent = (world, entityId, componentName, data) => ({
            ...world, components: {...world.components,
                [componentName]: {...world.components[componentName],[entityId]: data}
            }
        });

        const removeComponent = (world, entityId, componentName) => {
            const { [entityId]: _, ...rest } = world.components[componentName];
            return { ...world, components: { ...world.components, [componentName]: rest } };
        };
        const query = (world, ...componentNames) => 
            world.entities.filter(entityId => componentNames.reduce((has, component) => 
            has && entityId in world.components[component], true));
        

        // World
        const CREATE_WORLD = {
            nextEntityId: 1,
            entities: [],
            components: {
                position: {},
                velocity: {},
                render: {},
                player: {},
                enemy: {},
                bullet: {},
                health: {},
                shootCooldown: {},
            },
            score: 0,
            gameState: 'menu', // 'menu' | 'playing' | 'gameover' | 'win'
            fallingStarField: [],
        }

        const createEntity = world => {
            const id  = world.nextEntityId;
            const updatedWorld = { ...world, nextEntityId: id + 1, entities: [...world.entities, id] };
            return [updatedWorld, id];
        }

        const addComponent = (world, entityId, componentName, data) => 
            setComponent(world, entityId, componentName, data);
        
        const destroyEntity = (world, entityId) => {
            const components = Object.keys(world.components).reduce((acc, componentName) => {
                const { [entityId]: _, ...rest } = world.components[componentName];
                return { ...acc, [componentName]: rest };
            }, {});
            return {
                ...world,
                entities: world.entities.filter(id => id !== entityId),
                components
            };
        };

        //background falling stars, purely cosmetic
        const makeFallingStars = count =>
            Array.from({ length: count }, () => ({
                x: Math.random() * Width,
                y: Math.random() * Height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.5
            }));

        const spawnPlayer = world => {
            const [nextWorld, playerId] = createEntity(world);
            return pipe(
                world => addComponent(world, playerId, 'position', { x: Width / 2, y: Height - 100 }),
                world => addComponent(world, playerId, 'velocity', { velocityX: 0, velocityY: 0 }),
                world => addComponent(world, playerId, 'render', { shape: 'ship', color: 'cyan', width: 40, height: 50 }),
                world => addComponent(world, playerId, 'player', {}),
                world => addComponent(world, playerId, 'health', { value: 3 }),
                world => addComponent(world, playerId, 'shootCooldown', { cooldown: 0 })
            )(nextWorld);
        }

        const ENEMY_COUNT_MIN = 6;
        const ENEMY_COUNT_MAX = 12;
        const ENEMY_SPAWN_PADDING = 40;

        const spawnEnemies = world => {
            const count = Math.floor(Math.random() * (ENEMY_COUNT_MAX - ENEMY_COUNT_MIN + 1)) + ENEMY_COUNT_MIN;
            return Array.from({ length: count }).reduce(currentWorld => {
                const [nextWorld, enemyId] = createEntity(currentWorld);
                const x    = ENEMY_SPAWN_PADDING + Math.random() * (Width - ENEMY_SPAWN_PADDING * 2);
                const y    = ENEMY_SPAWN_PADDING + Math.random() * (Height / 2 - ENEMY_SPAWN_PADDING);
                const dirX = Math.random() < 0.5 ? ENEMY_SPAWN_PADDING : -ENEMY_SPAWN_PADDING;
                return pipe(
                    w => addComponent(w, enemyId, 'position', { x, y }),
                    w => addComponent(w, enemyId, 'velocity', { velocityX: dirX, velocityY: 0 }),
                    w => addComponent(w, enemyId, 'render',   { shape: 'enemy', color: 'red', width: 40, height: 30 }),
                    w => addComponent(w, enemyId, 'enemy',    { shootCooldown: Math.random() * 2 + 1 }),
                    w => addComponent(w, enemyId, 'health',   { value: 1 })
                )(nextWorld);
            }, world);
        };

        const initWorld = () => {
            const base = { ...CREATE_WORLD, fallingStarField: makeFallingStars(50) };
            return spawnEnemies(spawnPlayer(base));
        };


        // Inputs
        const clickInput = { pendingStart: false };
        const keysDown = new Set();
        window.addEventListener('keydown', event => {
            keysDown.add(event.code);
            if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'KeyW', 'KeyA', 'KeyS', 'KeyD', 'Enter'].includes(event.code)) {
                event.preventDefault(); // Prevent default browser behavior for these keys
            }
        });
        window.addEventListener('keyup', event => { keysDown.delete(event.code) });


        canvas.addEventListener('click', event => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = Width / rect.width;
            const scaleY = Height / rect.height;
            const cx = (event.clientX - rect.left) * scaleX;
            const cy = (event.clientY - rect.top) * scaleY;
            if (cx >= Width/2 - 70 && cx <= Width/2 + 70 && cy >= Height/2 + 60 && cy <= Height/2 + 104) {
                clickInput.pendingStart = true; 
            }
        });

        const PLAYER_SPEED = 220; // pixels per second

        const inputSystem = deltaTime => world => {
            if (world.gameState !== 'playing') return world;
            const players = query(world, 'player', 'velocity');
            return players.reduce((world, playerId) => {
                const velocityX = (keysDown.has('ArrowLeft') || keysDown.has('KeyA') ? -PLAYER_SPEED : 0) + (keysDown.has('ArrowRight') || keysDown.has('KeyD') ? PLAYER_SPEED : 0);
                const velocityY = (keysDown.has('ArrowUp') || keysDown.has('KeyW') ? -PLAYER_SPEED : 0) + (keysDown.has('ArrowDown') || keysDown.has('KeyS') ? PLAYER_SPEED : 0);
                return setComponent(world, playerId, 'velocity', { velocityX, velocityY });
            }, world);
        };

    
        // Movement

        const ENTITY_BOUNCE_MARGIN = 10; // Margin from the edge of the screen where enemies will bounce
        const ENEMY_BOUNCE_PX = 24;

        const movementSystem = deltaTime => world => {
            if (world.gameState !== 'playing') return world;
            const movers = query(world, 'position', 'velocity');

            const moved = movers.reduce((world, entityId) => {
                const position = world.components.position[entityId];
                const velocity = world.components.velocity[entityId];
                const rawX = position.x + velocity.velocityX * deltaTime;
                const rawY = position.y + velocity.velocityY * deltaTime;
                const isPlayer = entityId in world.components.player;

                const { width, height } = world.components.render[entityId];
                const newX = isPlayer ? Math.max(width / 2, Math.min(Width - width / 2, rawX)) : rawX;
                const newY = isPlayer ? Math.max(height / 2, Math.min(Height - height / 2, rawY)) : rawY;
                return setComponent(setComponent(world, entityId, 'position', { x: newX, y: newY }), entityId, 'velocity', { velocityX: velocity.velocityX, velocityY: velocity.velocityY });
            }, world);

        const enemies = query(moved, 'enemy', 'position', 'velocity');

        return enemies.reduce((world, enemyId) => {
            const position = world.components.position[enemyId];
            const velocity = world.components.velocity[enemyId];
            const renderWidth = world.components.render[enemyId]?.width ?? 0;

            const hitLeft  = position.x - renderWidth / 2 <= ENTITY_BOUNCE_MARGIN;
            const hitRight = position.x + renderWidth / 2 >= Width - ENTITY_BOUNCE_MARGIN;

            if (!hitLeft && !hitRight) return world;

            const clampedX = Math.max(ENTITY_BOUNCE_MARGIN + renderWidth / 2, Math.min(Width - ENTITY_BOUNCE_MARGIN - renderWidth / 2, position.x));
            return setComponent(
                setComponent(world, enemyId, 'velocity', { velocityX: -velocity.velocityX, velocityY: 0 }),
                enemyId, 'position', { x: clampedX, y: position.y }
            );
        }, moved);
        };
        
        // Shooting
        const BULLET_SPEED = 300;
        const SHOOT_COOLDOWN = 0.25; // seconds
        
        const spawnBullet = (world, x, y, velocityY, owner, color) => {
            const [nextWorld, bulletId] = createEntity(world);
            return pipe(
                w => addComponent(w, bulletId, 'position', { x, y }),
                w => addComponent(w, bulletId, 'velocity', { velocityX: 0, velocityY }),
                w => addComponent(w, bulletId, 'render', { shape: 'bullet', color, width: 5, height: 10 }),
                w => addComponent(w, bulletId, 'bullet', { owner })
            )(nextWorld);
        }

        const shootingSystem = deltaTime => world => {
            if (world.gameState !== 'playing') return world;
            const players = query(world, 'player', 'position', 'shootCooldown');
            
            return players.reduce((world, entityId) => {
                const cooldown = world.components.shootCooldown[entityId].cooldown;
                const newCooldown = Math.max(0, cooldown - deltaTime);
                const position = world.components.position[entityId];
                const worldCoolDown = setComponent(world, entityId, 'shootCooldown', { cooldown: newCooldown });

                if (keysDown.has('Space') && newCooldown === 0) {
                    const worldBullet = spawnBullet(worldCoolDown, position.x, position.y - 30, -BULLET_SPEED, 'player', 'cyan');
                    return setComponent(worldBullet, entityId, 'shootCooldown', { cooldown: SHOOT_COOLDOWN });
                }
                return worldCoolDown;
            }, world);
        };


        // AI
        const AI_BULLET_SPEED = 200;

        const aiSystem = deltaTime => world => {
            if (world.gameState !== 'playing') return world;
            const enemies = query(world, 'enemy', 'position');

            return enemies.reduce((world, enemyId) => {
                const enemy = world.components.enemy[enemyId];
                const newCooldown = enemy.shootCooldown - deltaTime;
                if (newCooldown <= 0) {
                    const position = world.components.position[enemyId];
                    const shotCooldown = 1.2 + Math.random() * 2; //random cooldown between 1.2 and 3.2 seconds
                    const worldShot = spawnBullet(world, position.x + 18, position.y + 30, AI_BULLET_SPEED, 'enemy', 'red');
                    return setComponent(worldShot, enemyId, 'enemy', { shootCooldown: shotCooldown });
                }
                return setComponent(world, enemyId, 'enemy', { shootCooldown: newCooldown });
            }, world);
        };

        
        // Collision

        const aabb = (ax , ay, aw, ah, bx, by, bw, bh) => ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;

        const collisionSystem = _ => world => {
        if (world.gameState !== 'playing') return world;

        const bullets = query(world, 'bullet', 'position');
        const enemies = query(world, 'enemy',  'position', 'render');
        const players = query(world, 'player', 'position', 'render', 'health');

        const playerBullets = bullets.filter(id => world.components.bullet[id]?.owner === 'player');
        const enemyBullets  = bullets.filter(id => world.components.bullet[id]?.owner === 'enemy');

        const { world: w1, toDestroy: td1 } = playerBullets.reduce(
            ({ world: w, toDestroy }, bulletId) => {
                const bPos = w.components.position[bulletId];
                const bRen = w.components.render[bulletId];
                return enemies.reduce(({ world: w2, toDestroy: td }, enemyId) => {
                    if (td.includes(enemyId) || td.includes(bulletId)) return { world: w2, toDestroy: td };
                    const ePos = w2.components.position[enemyId];
                    const eRen = w2.components.render[enemyId];
                    if (aabb(bPos.x, bPos.y, bRen.width, bRen.height, ePos.x, ePos.y, eRen.width, eRen.height)) {
                        return { world: { ...w2, score: w2.score + 100 }, toDestroy: [...td, bulletId, enemyId] };
                    }
                    return { world: w2, toDestroy: td };
                }, { world: w, toDestroy });
            },
            { world, toDestroy: [] }
        );

        // Enemy bullets vs player — pure reduce, no mutation
        const { world: w2, toDestroy: td2 } = players.reduce(
            ({ world: w, toDestroy }, playerId) => {
                const pPos = w.components.position[playerId];
                const pRen = w.components.render[playerId];
                return enemyBullets.reduce(({ world: w2, toDestroy: td }, bulletId) => {
                    if (td.includes(playerId) || td.includes(bulletId)) return { world: w2, toDestroy: td };
                    const bPos = w2.components.position[bulletId];
                    const bRen = w2.components.render[bulletId];
                    if (aabb(bPos.x, bPos.y, bRen.width, bRen.height, pPos.x, pPos.y, pRen.width, pRen.height)) {
                        const newHealth = w2.components.health[playerId].value - 1;
                        const newWorld  = newHealth <= 0
                            ? { ...destroyEntity(w2, playerId), gameState: 'gameover' }
                            : setComponent(w2, playerId, 'health', { value: newHealth });
                        return { world: newWorld, toDestroy: [...td, bulletId] };
                    }
                    return { world: w2, toDestroy: td };
                }, { world: w, toDestroy });
            },
            { world: w1, toDestroy: td1 }
        );

        const finalWorld = td2.reduce((w, id) => destroyEntity(w, id), w2);

        const remainingEnemies = query(finalWorld, 'enemy');
        return remainingEnemies.length === 0 && finalWorld.gameState === 'playing'
            ? spawnEnemies(finalWorld)
            : finalWorld;
    };


        //Bullet Cleanup

        const bulletCleanupSystem = _ => world => {
            const bullets = query(world, 'bullet', 'position', 'render');
            const offscreen = bullets.filter(bid => {
                const pos = world.components.position[bid];
                return pos.y < -20 || pos.y > Height + 20;
            });
            return offscreen.reduce((world, bid) => destroyEntity(world, bid), world);
        }


        //Star System

        const tickStars = deltaTime => world => ({
            ...world,
            fallingStarField: world.fallingStarField.map(star => ({
                ...star,
                y: (star.y + star.speed * deltaTime * 60) % Height
            }))
        });


        //Render
        const drawShip = (ctx, x, y, width, height, color) => {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        // Body
        ctx.beginPath();
        ctx.moveTo(0, -height / 2);
        ctx.lineTo(width / 2, height / 2);
        ctx.lineTo(-width / 2, height / 2);
        ctx.closePath();
        ctx.fill();
        // Engine glow
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-6, height / 2 - 6, 12, 8);
        ctx.restore();
        };

        const drawEnemy = (ctx, x, y, width, height, color) => {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0, 0, width / 2, height / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffd';
        ctx.beginPath();
        ctx.ellipse(0, -height / 5, width / 4, height / 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        };

        const drawBullet = (ctx, x, y, width, height, color) => {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
        ctx.fillRect(-width / 2, -height / 2, width, height);
        ctx.restore();
        };

        const renderSystem = _ => world => {
        // --- Background ---
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, Width, Height);

        // --- Stars ---
        world.fallingStarField.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${0.3 + s.size * 0.3})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // --- Entities with render + position ---
        const renderables = query(world, 'render', 'position');
        const drawFunctions = { ship: drawShip, enemy: drawEnemy, bullet: drawBullet };

        renderables
            .filter(eid => world.gameState !== 'menu')
            .map(eid => ({
                fn:     drawFunctions[world.components.render[eid].shape],
                args:   [ctx, world.components.position[eid].x, world.components.position[eid].y,
                        world.components.render[eid].width, world.components.render[eid].height,
                        world.components.render[eid].color]
            }))
            .filter(({ fn }) => fn)
            .map(({ fn, args }) => fn(...args)); 

        // --- HUD: Score ---
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`Score: ${world.score}`, 12, 24);

        // --- HUD: Lives (player health) ---
        const playerIds = query(world, 'player', 'health');
        if (playerIds.length > 0) {
            const health = world.components.health[playerIds[0]].value;
            ctx.fillStyle = '#f44';
            ctx.textAlign = 'right';
            ctx.fillText(`❤ ${health}`, Width - 12, 24);
        }

        // --- Game Over / Win overlay ---
        if (world.gameState === 'menu') {
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, Width, Height);

            ctx.fillStyle = 'cyan';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Space Shooter', Width / 2, Height / 2 - 60);

            // Play button
            ctx.strokeStyle = '#4f4';
            ctx.lineWidth = 2;
            ctx.strokeRect(Width / 2 - 70, Height / 2 + 60, 140, 44);
            ctx.fillStyle = '#4f4';
            ctx.font = 'bold 22px Arial';
            ctx.fillText('▶  PLAY', Width / 2, Height / 2 + 89);

            ctx.fillStyle = '#555';
            ctx.font = '14px Arial';
            ctx.fillText('or press Enter', Width / 2, Height / 2 + 128);
        }

        if (world.gameState === 'win') {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, Width, Height);

            ctx.fillStyle = '#4f4';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('YOU WIN!', Width / 2, Height / 2 - 20);

            ctx.fillStyle = '#aaa';
            ctx.font = '20px Arial';
            ctx.fillText(`Final Score: ${world.score}`, Width / 2, Height / 2 + 24);
            ctx.fillText('Press Enter for Menu', Width / 2, Height / 2 + 56);
        }

        if (world.gameState === 'gameover') {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, Width, Height);

            ctx.fillStyle = '#f44';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', Width / 2, Height / 2 - 20);

            ctx.fillStyle = '#aaa';
            ctx.font = '20px Arial';
            ctx.fillText(`Final Score: ${world.score}`, Width / 2, Height / 2 + 24);
            ctx.fillText('Press Enter for Menu', Width / 2, Height / 2 + 56);
        }
        return world;
        };

        //Restart

        const restartSystem = _ => world => {
            if (world.gameState === 'menu' && (keysDown.has('Enter') || clickInput.pendingStart)) {
                clickInput.pendingStart = false;
                return { ...initWorld(), gameState: 'playing' };
            }
            if ((world.gameState === 'gameover' || world.gameState === 'win') && keysDown.has('Enter')) {
                keysDown.delete('Enter');
                return initWorld();
            }
            return world;
        };

        // Main Loop

        const buildPipeline = deltaTime => pipe(
            restartSystem(deltaTime),
            inputSystem(deltaTime),
            movementSystem(deltaTime),
            shootingSystem(deltaTime),
            aiSystem(deltaTime),
            collisionSystem(deltaTime),
            bulletCleanupSystem(deltaTime),
            tickStars(deltaTime),
            renderSystem(deltaTime), 
        );

        const gameLoop = (world, lastTime) => timestamp => {
            const resolvedLast = lastTime ?? timestamp;
            const dt = Math.min((timestamp - resolvedLast) / 1000, 0.05);
            const nextWorld = buildPipeline(dt)(world);
            requestAnimationFrame(gameLoop(nextWorld, timestamp));
        };

        requestAnimationFrame(gameLoop(initWorld(), null));

    </script>
</body>
</html>
